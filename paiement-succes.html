<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement confirmé — SPARTIATE</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supa.js"></script>
  <style>
    .succes-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--section-alt);
    }
    .succes-box {
      background: var(--white); border: 1px solid var(--border); border-radius: 16px;
      padding: 3rem 2.5rem; max-width: 480px; width: 90%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .succes-icon { font-size: 4rem; margin-bottom: 1rem; }
    .succes-box h1 { font-size: 1.6rem; font-weight: 900; color: var(--blue-title); margin-bottom: .6rem; }
    .succes-box p  { color: var(--text-muted); font-size: .92rem; line-height: 1.6; }
    .succes-box .btn-primary { margin-top: 1.8rem; display: inline-block; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="succes-wrap">
    <div class="succes-box" id="box">
      <div class="spinner"></div>
      <p style="color:var(--text-muted);">Activation de votre abonnement…</p>
    </div>
  </main>

  <script>
    const PLAN_LABEL = {
      spartiate_starter: 'Starter',
      spartiate_vip:     'VIP',
      spartiate_pro:     'Pro',
      spartiate_gestion: 'Gestion',
    };

    async function activerAbonnement() {
      const email = sessionStorage.getItem('user_email');
      const plan  = sessionStorage.getItem('pending_plan');
      const box   = document.getElementById('box');

      // Si pas d'email en session → renvoyer vers login
      if (!email) {
        window.location.href = 'login.html';
        return;
      }

      // Mettre à jour la DB : paiement = true + bon abonnement
      const { error } = await supa
        .from('clients')
        .update({ paiement: true, abonnement: plan || 'spartiate_pro' })
        .eq('email', email);

      if (error) {
        box.innerHTML = `
          <div class="succes-icon">❌</div>
          <h1>Erreur d'activation</h1>
          <p style="font-size:.8rem;color:#94A3B8;margin-top:.5rem;">Détail : ${error.message}</p>
          <p style="font-size:.8rem;color:#94A3B8;">Email : ${email} | Plan : ${plan}</p>
          <p>Contactez-nous à <a href="mailto:support@spartiate-prono.fr">support@spartiate-prono.fr</a></p>`;
        return;
      }

      // Mettre à jour la session
      sessionStorage.setItem('user_abonnement', plan || 'spartiate_pro');
      sessionStorage.removeItem('pending_plan');

      const label = PLAN_LABEL[plan] || 'Pro';

      box.innerHTML = `
        <div class="succes-icon">🎉</div>
        <h1>Bienvenue chez SPARTIATE !</h1>
        <p>Votre abonnement <strong>${label}</strong> est maintenant actif.<br>
        Accédez à vos pronostics dès maintenant.</p>
        <a href="dashboard.html" class="btn-primary" style="text-decoration:none; padding:.75rem 2rem; border-radius:8px; background:var(--red); color:#fff; font-weight:700; font-size:1rem; display:inline-block; margin-top:1.8rem;">
          Accéder au Dashboard →
        </a>`;

      // Redirection auto après 3s
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
    }

    activerAbonnement();
  </script>
</body>
</html>
