<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement confirmé — SPARTIATE</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supa.js"></script>
  <style>
    .succes-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--section-alt);
    }
    .succes-box {
      background: var(--white); border: 1px solid var(--border); border-radius: 16px;
      padding: 3rem 2.5rem; max-width: 480px; width: 90%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .succes-icon { font-size: 4rem; margin-bottom: 1rem; }
    .succes-box h1 { font-size: 1.6rem; font-weight: 900; color: var(--blue-title); margin-bottom: .6rem; }
    .succes-box p  { color: var(--text-muted); font-size: .92rem; line-height: 1.6; }
    .succes-box .btn-primary { margin-top: 1.8rem; display: inline-block; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: var(--red); border-radius: 50%; animation: spin .8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="succes-wrap">
    <div class="succes-box" id="box">
      <div class="spinner"></div>
      <p style="color:var(--text-muted);">Activation de votre abonnement…</p>
    </div>
  </main>

  <script>
    const PLAN_LABEL = {
      spartiate_starter: 'Starter',
      spartiate_vip:     'VIP',
      spartiate_pro:     'Pro',
      spartiate_gestion: 'Gestion',
    };

    function activerAbonnement() {
      const email = sessionStorage.getItem('user_email');
      const plan  = sessionStorage.getItem('pending_plan');

      // Si pas d'email → login
      if (!email) { window.location.href = 'login.html'; return; }

      // Marquer que le paiement Stripe est confirmé
      // L'activation DB se fera depuis le dashboard (contexte sûr)
      sessionStorage.setItem('stripe_paid', '1');

      // Redirection vers dashboard dans 2s
      const box = document.getElementById('box');
      const label = PLAN_LABEL[plan] || 'Pro';
      box.innerHTML = `
        <div class="succes-icon">🎉</div>
        <h1>Bienvenue chez SPARTIATE !</h1>
        <p>Votre abonnement <strong>${label}</strong> est en cours d'activation.<br>
        Vous allez être redirigé automatiquement…</p>`;

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
    }

    // Attendre que supa soit prêt avant d'exécuter
    function waitForSupa(cb, tries = 0) {
      if (typeof supa !== 'undefined') { cb(); }
      else if (tries < 20) { setTimeout(() => waitForSupa(cb, tries + 1), 150); }
      else { document.getElementById('box').innerHTML = '<p style="color:red;">Erreur : client Supabase non chargé.</p>'; }
    }

    waitForSupa(activerAbonnement);
  </script>
</body>
</html>
